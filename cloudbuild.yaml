# Cloud Build — Maison Delor Demo Dashboard
# Déclenché sur push dans main.
# Build → Push → Deploy (pas de Terraform — infra gérée manuellement).

substitutions:
  _REGION: europe-west1
  _REGISTRY: europe-west1-docker.pkg.dev/delor-demo/hippocampe
  _API_SERVICE: hippocampe-api
  _FRONTEND_SERVICE: hippocampe-frontend
  _SA: hippocampe-sa
  # Mapping dossiers GCS → codes boutiques (JSON).
  # Modifier pour chaque client : '{"paris":"HIP","lyon":"SED","bordeaux":"HPC","nantes":"ACC"}'
  _BOUTIQUES_CONFIG: '{"hippocampus":"HIP","sedaine":"SED","hippocampe":"HPC","accessoires":"ACC"}'
  _APP_NAME: MAISON DELOR

steps:

  # ── 1. Build API ─────────────────────────────────────────────────────────

  - id: build-api
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - Dockerfile.api
      - -t
      - $_REGISTRY/api:$SHORT_SHA
      - -t
      - $_REGISTRY/api:latest
      - --cache-from
      - $_REGISTRY/api:latest
      - .
    waitFor: ["-"]

  # ── 2. Push API ──────────────────────────────────────────────────────────

  - id: push-api
    name: gcr.io/cloud-builders/docker
    args: [push, --all-tags, $_REGISTRY/api]
    waitFor: [build-api]

  # ── 3. Build Frontend ────────────────────────────────────────────────────

  - id: build-frontend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - Dockerfile.frontend
      - -t
      - $_REGISTRY/frontend:$SHORT_SHA
      - -t
      - $_REGISTRY/frontend:latest
      - --cache-from
      - $_REGISTRY/frontend:latest
      - .
    waitFor: [push-api]

  # ── 4. Push Frontend ─────────────────────────────────────────────────────

  - id: push-frontend
    name: gcr.io/cloud-builders/docker
    args: [push, --all-tags, $_REGISTRY/frontend]
    waitFor: [build-frontend]

  # ── 5. Déployer API ──────────────────────────────────────────────────────

  - id: deploy-api
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_API_SERVICE
      - --image=$_REGISTRY/api:$SHORT_SHA
      - --region=$_REGION
      - --platform=managed
      - --ingress=all
      - --no-allow-unauthenticated
      - --service-account=$_SA@$PROJECT_ID.iam.gserviceaccount.com
      - --memory=1Gi
      - --cpu=1
      - --port=8000
      - --min-instances=0
      - --max-instances=3
      - --set-env-vars=GCP_PROJECT_ID=$PROJECT_ID,BQ_RAW_DATASET=hippocampe_raw,BQ_DWH_DATASET=hippocampe_dwh,BQ_DTM_DATASET=hippocampe_dtm,SKIP_AUTH_MIDDLEWARE=true
    waitFor: [push-api]

  # ── 6. Récupérer l'URL API ───────────────────────────────────────────────

  - id: get-api-url
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run services describe $_API_SERVICE \
          --region=$_REGION \
          --format='value(status.url)' > /workspace/api_url.txt
        echo "API URL : $(cat /workspace/api_url.txt)"
    waitFor: [deploy-api]

  # ── 7. Déployer Frontend ─────────────────────────────────────────────────

  - id: deploy-frontend
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        API_URL=$$(cat /workspace/api_url.txt)
        gcloud run deploy $_FRONTEND_SERVICE \
          --image=$_REGISTRY/frontend:$SHORT_SHA \
          --region=$_REGION \
          --platform=managed \
          --ingress=all \
          --allow-unauthenticated \
          --service-account=$_SA@$PROJECT_ID.iam.gserviceaccount.com \
          --memory=512Mi \
          --cpu=1 \
          --port=3000 \
          --min-instances=0 \
          --max-instances=5 \
          --update-env-vars="API_URL=$$API_URL,NEXT_PUBLIC_API_URL=,APP_NAME=$_APP_NAME" \
          --set-secrets="AUTH_SECRET=hippocampe-auth-secret:latest,AUTH_USERS=hippocampe-auth-users:latest"
    waitFor: [push-frontend, get-api-url]

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
